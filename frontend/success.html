<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        .success-box {
            text-align: center;
        }

        .tick {
            font-size: 100px;
            color: green;
        }

        .continue-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .continue-btn:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>

    <div class="success-box">
        <div class="tick">✔</div>

        <h1>Order Placed Successfully</h1>

        <button id="continueShoppingBtn" class="continue-btn">
            Continue Shopping
        </button>
    </div>

    <script>
        document.getElementById("continueShoppingBtn").addEventListener("click", function () {
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
