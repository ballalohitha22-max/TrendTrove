<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendTrove</title>


   <link rel="stylesheet" href="css/style.css">
   <script src="js/main.js"></script>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
</head>

<body>

    <!-- LOGIN CHECK -->

    <script>

    if(localStorage.getItem("loggedIn") !== "true"){
        window.location.href = "login.html";
    }

    </script>



   <!-- NAVBAR -->

<nav class="navbar">

    <input type="text" placeholder="Search products..." class="search-bar">

    <div class="logo-section">
        <i class="fa-solid fa-cart-shopping"></i>
        <h1 class="logo-title">TrendTrove</h1>
    </div>

    <div class="nav-icons">

        <button onclick="logout()" class="logout-btn">
            Logout
        </button>

        <a href="cart.html">
            <i class="fa-solid fa-cart-shopping"></i>
        </a>

    </div>

</nav>

    <!-- SALE BANNER -->

    <section class="banner">

        <div class="banner-content">

            <h1>MEGA SALE 50% OFF</h1>

            <p>Best Deals on Shoes, Watches & Electronics</p>

        </div>

    </section>


    <!-- CATEGORIES -->

<section class="categories">

<h2>Shop by Category</h2>

<div class="category-container">

    <div class="category-card" onclick="openCategory('Electronics')">
        <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=500">
        <h3>Electronics</h3>
    </div>

    <div class="category-card" onclick="openCategory('Smartphones')">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500">
        <h3>Smartphones</h3>
    </div>

    <div class="category-card" onclick="openCategory('Computers')">
        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500">
        <h3>Computers</h3>
    </div>

    <div class="category-card" onclick="openCategory('Gaming')">
        <img src="https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?w=500">
        <h3>Gaming</h3>
    </div>

    <div class="category-card" onclick="openCategory('Home Appliances')">
        <img src="https://images.unsplash.com/photo-1586208958839-06c17cacdf08?w=500">
        <h3>Home Appliances</h3>
    </div>

    <div class="category-card" onclick="openCategory('Fitness')">
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=500">
        <h3>Fitness</h3>
    </div>

    <div class="category-card" onclick="openCategory('Accessories')">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500">
        <h3>Accessories</h3>
    </div>

</div>

</section>

    <!-- PRODUCTS -->

    <section class="products">

        <h2>Featured Products</h2>

        <div class="product-container" id="productContainer">

        </div>

    </section>


    <!-- JAVASCRIPT -->

    <script src="js/main.js"></script>

    <script>

    function logout(){

        localStorage.removeItem("loggedIn");

        window.location.href = "login.html";
    }

    </script>

</body>
</html>
